<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        /* Professional Theme */
        body.professional.light {
            background: #f5f5f5;
        }

        body.professional.dark {
            background: #1a1a1a;
        }

        /* Playful Theme */
        body.playful {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .logo {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
            transition: all 0.3s ease;
        }

        /* Professional Logo */
        body.professional.light .logo {
            color: #202124;
            text-shadow: none;
        }

        body.professional.dark .logo {
            color: #e8eaed;
            text-shadow: none;
        }

        body.professional .logo span {
            animation: none;
            color: inherit;
        }

        /* Playful Logo */
        body.playful .logo {
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        body.playful .logo span {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        body.playful .logo span:nth-child(1) { animation-delay: 0s; color: #ff6b6b; }
        body.playful .logo span:nth-child(2) { animation-delay: 0.1s; color: #feca57; }
        body.playful .logo span:nth-child(3) { animation-delay: 0.2s; color: #48dbfb; }
        body.playful .logo span:nth-child(4) { animation-delay: 0.3s; color: #ff9ff3; }
        body.playful .logo span:nth-child(5) { animation-delay: 0.4s; color: #54a0ff; }
        body.playful .logo span:nth-child(6) { animation-delay: 0.5s; color: #00d2d3; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .search-box {
            background: white;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 20px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        /* Professional Search Box */
        body.professional.light .search-box {
            background: white;
            border: 1px solid #dfe1e5;
            box-shadow: none;
        }

        body.professional.dark .search-box {
            background: #303134;
            border: 1px solid #5f6368;
            box-shadow: none;
        }

        body.professional.light .search-box:hover {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        }

        body.professional.dark .search-box:hover {
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
        }

        /* Playful Search Box */
        body.playful .search-box {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        body.playful .search-box:hover {
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 15px 10px;
            font-size: 16px;
            background: transparent;
            transition: all 0.3s ease;
        }

        body.professional.dark .search-box input {
            color: #e8eaed;
        }

        body.professional.dark .search-box input::placeholder {
            color: #9aa0a6;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            opacity: 0.5;
            flex-shrink: 0;
        }

        body.professional.dark .search-icon {
            stroke: #9aa0a6;
        }

        .ai-search-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            flex-shrink: 0;
            position: relative;
        }

        .ai-search-btn.initial-glow {
            animation: initialGlow 1s ease-out;
        }

        .ai-search-btn:hover {
            background: #1557b0;
            box-shadow: 0 0 40px rgba(26, 115, 232, 1), 0 0 60px rgba(26, 115, 232, 0.8);
        }

        .ai-search-btn.hidden {
            display: none;
        }

        @keyframes initialGlow {
            0% {
                box-shadow: 0 0 30px rgba(26, 115, 232, 0.8);
            }
            100% {
                box-shadow: none;
            }
        }

        body.playful .ai-search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.playful .ai-search-btn.initial-glow {
            animation: initialGlowPlayful 1s ease-out;
        }

        body.playful .ai-search-btn:hover {
            background: linear-gradient(135deg, #5568d3 0%, #63408b 100%);
            box-shadow: 0 0 50px rgba(118, 75, 162, 1), 0 0 70px rgba(118, 75, 162, 0.9);
        }

        @keyframes initialGlowPlayful {
            0% {
                box-shadow: 0 0 40px rgba(118, 75, 162, 0.9);
            }
            100% {
                box-shadow: none;
            }
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Professional Buttons */
        body.professional.light .btn {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            color: #3c4043;
        }

        body.professional.light .btn:hover {
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
            border: 1px solid #dadce0;
        }

        body.professional.dark .btn {
            background: #303134;
            border: 1px solid #303134;
            color: #e8eaed;
        }

        body.professional.dark .btn:hover {
            border: 1px solid #5f6368;
        }

        /* Playful Buttons */
        body.playful .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        body.playful .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        body.professional.light .settings-btn {
            background: white;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        }

        body.professional.dark .settings-btn {
            background: #303134;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
        }

        body.playful .settings-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .settings-btn:hover svg {
            transform: rotate(180deg);
        }

        .settings-btn.active svg {
            transform: rotate(360deg);
        }

        .settings-btn svg {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        body.professional.light .settings-btn svg {
            fill: #5f6368;
        }

        body.professional.dark .settings-btn svg {
            fill: #e8eaed;
        }

        body.playful .settings-btn svg {
            fill: white;
        }

        .settings-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            border-radius: 12px;
            padding: 20px;
            min-width: 250px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 999;
            display: none;
        }

        .settings-panel.active {
            display: block;
        }

        body.professional.light .settings-panel {
            background: white;
        }

        body.professional.dark .settings-panel {
            background: #303134;
            color: #e8eaed;
        }

        body.playful .settings-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-section:last-child {
            margin-bottom: 0;
        }

        .settings-section h3 {
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        body.professional.light .settings-section h3 {
            color: #202124;
        }

        .settings-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        body.professional.light .settings-option:hover {
            background: #f8f9fa;
        }

        body.professional.dark .settings-option:hover {
            background: #3c4043;
        }

        body.playful .settings-option:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .settings-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .settings-option label {
            cursor: pointer;
            flex: 1;
            font-size: 14px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        body.professional.light .footer {
            color: #70757a;
        }

        body.professional.dark .footer {
            color: #9aa0a6;
        }

        body.playful .footer {
            color: rgba(255, 255, 255, 0.7);
        }

        .footer a {
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        body.professional.light .footer a {
            color: #70757a;
        }

        body.professional.dark .footer a {
            color: #9aa0a6;
        }

        body.playful .footer a {
            color: rgba(255, 255, 255, 0.9);
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>D</span><span>r</span><span>a</span><span>g</span><span>o</span><span>n</span>
        </div>
        
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="Search the web..." />
            <button class="ai-search-btn" id="aiSearchBtn" onclick="performAISearch()">AI Search</button>
        </div>
        
        <div class="buttons">
            <button class="btn" onclick="performSearch()">Dragon Search</button>
            <button class="btn" onclick="feelingLucky()">I'm Feeling Lucky</button>
        </div>
    </div>

    <button class="settings-btn" id="settingsBtn">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/>
        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-section">
            <h3>Theme</h3>
            <div class="settings-option" onclick="setColorMode('light')">
                <input type="radio" name="colorMode" id="lightMode" value="light">
                <label for="lightMode">Light</label>
            </div>
            <div class="settings-option" onclick="setColorMode('dark')">
                <input type="radio" name="colorMode" id="darkMode" value="dark">
                <label for="darkMode">Dark</label>
            </div>
            <div class="settings-option" onclick="setColorMode('system')">
                <input type="radio" name="colorMode" id="systemMode" value="system" checked>
                <label for="systemMode">System</label>
            </div>
        </div>
        <div class="settings-section">
            <h3>Style</h3>
            <div class="settings-option" onclick="setStyle('professional')">
                <input type="radio" name="style" id="professionalStyle" value="professional" checked>
                <label for="professionalStyle">Professional, Minimal</label>
            </div>
            <div class="settings-option" onclick="setStyle('playful')">
                <input type="radio" name="style" id="playfulStyle" value="playful">
                <label for="playfulStyle">Playful, Colorful</label>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://about.google/?utm_source=google-MK&utm_medium=referral&utm_campaign=hp-footer&fg=1" target="_blank">About</a>
        <a href="https://policies.google.com/privacy?hl=en-MK&fg=1" target="_blank">Privacy</a>
        <a href="https://policies.google.com/terms?hl=en-MK&fg=1" target="_blank">Terms</a>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const aiSearchBtn = document.getElementById('aiSearchBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        
        // Initialize settings from localStorage
        let currentColorMode = localStorage.getItem('colorMode') || 'system';
        let currentStyle = localStorage.getItem('style') || 'professional';
        
        function applyTheme() {
            const body = document.body;
            body.className = '';
            
            // Apply style
            body.classList.add(currentStyle);
            
            // Apply color mode
            if (currentColorMode === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                body.classList.add(prefersDark ? 'dark' : 'light');
            } else {
                body.classList.add(currentColorMode);
            }
            
            // Update radio buttons
            document.getElementById(`${currentColorMode}Mode`).checked = true;
            document.getElementById(`${currentStyle}Style`).checked = true;
        }
        
        function setColorMode(mode) {
            currentColorMode = mode;
            localStorage.setItem('colorMode', mode);
            applyTheme();
        }
        
        function setStyle(style) {
            currentStyle = style;
            localStorage.setItem('style', style);
            applyTheme();
        }
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (currentColorMode === 'system') {
                applyTheme();
            }
        });
        
        // Toggle settings panel
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('active');
            settingsBtn.classList.toggle('active');
        });
        
        // Close settings panel when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
                settingsPanel.classList.remove('active');
                settingsBtn.classList.remove('active');
            }
        });
        
        // Show/hide AI Search button based on input
        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim()) {
                aiSearchBtn.classList.add('hidden');
            } else {
                aiSearchBtn.classList.remove('hidden');
            }
        });
        
        // Add initial glow to AI Search button on page load
        window.addEventListener('load', () => {
            aiSearchBtn.classList.add('initial-glow');
            setTimeout(() => {
                aiSearchBtn.classList.remove('initial-glow');
            }, 1000);
        });
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        function performSearch() {
            const query = searchInput.value.trim();
            if (query) {
                const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                window.open(searchUrl, '_blank');
            }
        }

        function performAISearch() {
            const query = searchInput.value.trim();
            const aiSearchUrl = `https://www.google.com/search?sourceid=chrome&udm=50&aep=42&source=chrome.crn.rb${query ? '&q=' + encodeURIComponent(query) : ''}`;
            window.open(aiSearchUrl, '_blank');
        }

        function feelingLucky() {
            const query = searchInput.value.trim();
            if (query) {
                const luckyUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=1`;
                window.open(luckyUrl, '_blank');
            } else {
                window.open('https://www.google.com/doodles', '_blank');
            }
        }
        
        // Apply theme on load
        applyTheme();
    </script>
</body>
</html>
